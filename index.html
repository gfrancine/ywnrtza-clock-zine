<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YWNRTZA Clock</title>
  </head>
  <body>
    <div id="app">
      <main id="sketch-container">
        <p id="loading-text"></p>
        <!-- used by the zine imposition sketch -->
        <div id="zine-gen-container" class="hidden">
          <p>Open the console to see the full log!</p>
          <label for="n-zines"
            ># Zines <input type="number" id="n-zines" value="3"
          /></label>
          <label for="n-pages"
            ># Pages <input type="number" id="n-pages" value="16"
          /></label>
          <label for="file-prefix">Prefix <input id="file-prefix" /></label>
          <button id="generate-zines">Generate!</button>
          <iframe id="zine-pdf-preview" class="hidden"></iframe>
          <p></p>
        </div>
      </main>
      <footer id="footer">
        <p>
          <span id="time-display"></span>
          <br />
          <span> Tap anywhere to keep the screen awake! </span>
          <span
            >Made by
            <a target="_blank" href="https://instagram.com/gracefrancines"
              >@gracefrancines</a
            ></span
          >

          <button id="copy-link">Copy clock link</button>
          <button
            onclick="document.getElementById('footer').classList.add('hidden')"
          >
            Close
          </button>
        </p>
      </footer>
    </div>

    <div id="print-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
